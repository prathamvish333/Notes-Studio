apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notes-ingress
  namespace: notes-dev
spec:
  ingressClassName: nginx
  rules:
    http:
      paths:
      - path: /notes
        pathType: Prefix
        backend:
          service:
            name: notes-frontend-service
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notes-backend-ingress
  namespace: notes-dev
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: notes-backend-service
            port:
              number: 8000
