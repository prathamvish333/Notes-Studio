apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-frontend
  namespace: notes-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-frontend
  template:
    metadata:
      labels:
        app: notes-frontend
    spec:
      containers:
        - name: frontend
          image: prathamvish333/notes-frontend:v55-amd64
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.prathamvishwakarma.com"
